# ESPHome-пакет для бризера Tion (https://github.com/dentra/esphome-tion)
# Репозиторий: https://github.com/dima11235/esphome-tion-ha-lovelace
#
# Пакет управления воздушной заслонкой для Tion 4S.
#
# Что делает:
#   - Добавляет в HA переключатель switch.air_intake_target — желаемое положение заслонки
#     (вкл = открыто / воздух с улицы, выкл = закрыто / рециркуляция).
#   - При команде из HA — не откатывается, даже если устройство отклоняет команду.
#   - При изменении заслонки с пульта — переключатель обновляется вслед за железом.
#   - Физический switch tion_recirculation_current определяется здесь с internal: true
#     и скрыт из HA. В ESPHome-конфиге бризера его можно убрать или оставить —
#     этот пакет не зависит от внешнего определения.
#
# Подключение:
#
# packages:
#   tion_intake:
#     url: https://github.com/dima11235/esphome-tion-ha-lovelace
#     ref: main
#     refresh: 0s
#     files:
#       - esphome/tion_intake_4s.yaml   # этот файл

### ESPHome package: Air intake control for Tion 4S (recirculation switch)

# Логика рециркуляции:
#   recirculation ON  → воздух рециркулирует → заслонка ЗАКРЫТА (indoor)
#   recirculation OFF → воздух с улицы      → заслонка ОТКРЫТА (outdoor)

globals:
  # Флаг: мы только что отправили команду, следующий on_turn_on/off — ответ на неё, а не изменение с пульта
  # Префикс tion_intake_ исключает конфликт с глобалами других пакетов
  - id: tion_intake_commanding
    type: bool
    restore_value: no
    initial_value: 'false'

switch:
  # Физический switch рециркуляции — скрыт из HA
  - platform: tion
    id: tion_recirculation_current
    type: recirculation
    name: "Recirculation"
    internal: true
    on_turn_on:
      - lambda: |-
          if (id(tion_intake_commanding)) {
            // Ответ на нашу команду: switch уже в правильном оптимистичном состоянии
            id(tion_intake_commanding) = false;
          } else {
            // Изменение с пульта: рециркуляция включилась → заслонка закрыта
            id(air_intake_target).publish_state(false);
          }
    on_turn_off:
      - lambda: |-
          if (id(tion_intake_commanding)) {
            id(tion_intake_commanding) = false;
          } else {
            // Изменение с пульта: рециркуляция выключилась → заслонка открыта
            id(air_intake_target).publish_state(true);
          }

  # Управляющий переключатель — виден в HA
  - platform: template
    name: "Air Intake Open"
    id: air_intake_target
    icon: "mdi:valve"
    turn_on_action:
      - lambda: id(tion_intake_commanding) = true;
      - logger.log: "tion_intake_4s: target → open (recirculation OFF)"
      - switch.turn_off: tion_recirculation_current
    turn_off_action:
      - lambda: id(tion_intake_commanding) = true;
      - logger.log: "tion_intake_4s: target → closed (recirculation ON)"
      - switch.turn_on: tion_recirculation_current
