# ESPHome-пакет для бризера Tion (https://github.com/dentra/esphome-tion)
# Репозиторий: https://github.com/dima11235/esphome-tion-ha-lovelace
#
# Пакет управления воздушной заслонкой для Tion 4S.
#
# Что делает:
#   - Добавляет в HA переключатель switch.air_intake_target — целевое положение заслонки
#     (вкл = открыто / воздух с улицы, выкл = закрыто / рециркуляция).
#   - Физический switch tion_recirculation_current определяется здесь с internal: true
#     и скрыт из HA. В ESPHome-конфиге бризера его можно убрать или оставить —
#     этот пакет не зависит от внешнего определения.
#   - Логика: recirculation ON = заслонка закрыта, recirculation OFF = заслонка открыта.
#   - Boot-синхронизация: через 30 с после старта читает положение заслонки из железа
#     и выставляет таргет по нему — если пользователь не менял таргет раньше.
#     Если менял — оставляет таргет пользователя без изменений.
#   - Автокоррекция: если рециркуляция самопроизвольно сменила состояние при работающем
#     вентиляторе — возвращает в целевое состояние (реактивно через on_turn_on/off
#     и периодически раз в 10 с).
#   - При скорости 0 заслонка закрывается устройством автоматически — коррекция
#     не срабатывает, это штатное поведение.
#   - Флаг boot_sync_done блокирует автокоррекцию до завершения boot-синхронизации.
#
# Требует: esphome/tion_auto_mode.yaml (нужен sensor current_fan_speed)
#
# Подключение:
#
# packages:
#   tion_auto_mode:
#     url: https://github.com/dima11235/esphome-tion-ha-lovelace
#     ref: main
#     refresh: 0s
#     files:
#       - esphome/tion_auto_mode.yaml   # обязательно, нужен current_fan_speed
#       - esphome/tion_intake_4s.yaml   # этот файл

### ESPHome package: Air intake control for Tion 4S (recirculation switch)

# Логика рециркуляции:
#   recirculation ON  → воздух рециркулирует → заслонка ЗАКРЫТА (indoor)
#   recirculation OFF → воздух с улицы      → заслонка ОТКРЫТА (outdoor)

# Boot-синхронизация: через 30 с читаем состояние железа и выставляем таргет по нему,
# если пользователь не изменил таргет вручную раньше этого момента.
esphome:
  on_boot:
    priority: -100.0
    then:
      - delay: 30s
      - if:
          condition:
            lambda: 'return !id(user_changed_target);'
          then:
            - logger.log: "tion_intake_4s: boot: syncing target from hardware"
            - globals.set:
                id: air_intake_target_open
                value: !lambda 'return !id(tion_recirculation_current).state;'
          else:
            - logger.log: "tion_intake_4s: boot: user changed target, skipping hardware sync"
      - globals.set: { id: boot_sync_done, value: 'true' }

# Глобальные переменные
globals:
  - id: air_intake_target_open
    type: bool
    restore_value: no
    initial_value: 'true'

  # Флаг: автокоррекция разрешена только после завершения boot-синхронизации
  - id: boot_sync_done
    type: bool
    restore_value: no
    initial_value: 'false'

  # Флаг: пользователь менял таргет до завершения boot-синхронизации
  - id: user_changed_target
    type: bool
    restore_value: no
    initial_value: 'false'

# Физический switch рециркуляции — скрыт из HA, только для внутренней логики
switch:
  - platform: tion
    id: tion_recirculation_current
    type: recirculation
    name: "Recirculation"
    internal: true
    on_turn_on:
      # Рециркуляция включилась → заслонка закрылась
      # Если цель — открыто и вентилятор работает → это ошибка, исправляем
      # До завершения boot-синхронизации не вмешиваемся
      - if:
          condition:
            and:
              - lambda: 'return id(boot_sync_done);'
              - lambda: 'return id(air_intake_target_open);'
              - lambda: 'return int(id(current_fan_speed).state) > 0;'
          then:
            - logger.log: "tion_intake_4s: auto-correcting recirculation (turning OFF)"
            - switch.turn_off: tion_recirculation_current
    on_turn_off:
      # Рециркуляция выключилась → заслонка открылась
      # Если цель — закрыто и вентилятор работает → это ошибка, исправляем
      # До завершения boot-синхронизации не вмешиваемся
      - if:
          condition:
            and:
              - lambda: 'return id(boot_sync_done);'
              - lambda: 'return !id(air_intake_target_open);'
              - lambda: 'return int(id(current_fan_speed).state) > 0;'
          then:
            - logger.log: "tion_intake_4s: auto-correcting recirculation (turning ON)"
            - switch.turn_on: tion_recirculation_current

  # Управляющий переключатель — виден в HA, показывает целевое положение
  - platform: template
    name: "Air Intake Open"
    id: air_intake_target
    icon: "mdi:valve"
    lambda: 'return id(air_intake_target_open);'
    turn_on_action:
      - logger.log: "tion_intake_4s: target → open (recirculation OFF)"
      - globals.set: { id: user_changed_target, value: 'true' }
      - globals.set: { id: air_intake_target_open, value: 'true' }
      - if:
          condition:
            lambda: 'return int(id(current_fan_speed).state) > 0;'
          then:
            - switch.turn_off: tion_recirculation_current
          # При скорости 0 команда железу не отправляется намеренно:
          # заслонка при speed=0 закрыта устройством автоматически и может не реагировать
          # на команды, что привело бы к бесконечным повторным отправкам из автокоррекции.
    turn_off_action:
      - logger.log: "tion_intake_4s: target → closed (recirculation ON)"
      - globals.set: { id: user_changed_target, value: 'true' }
      - globals.set: { id: air_intake_target_open, value: 'false' }
      - if:
          condition:
            lambda: 'return int(id(current_fan_speed).state) > 0;'
          then:
            - switch.turn_on: tion_recirculation_current

# Периодическая коррекция — восстанавливает состояние при спонтанном изменении заслонки
interval:
  - interval: 10s
    then:
      - if:
          condition:
            and:
              - lambda: 'return id(boot_sync_done);'
              - lambda: 'return int(id(current_fan_speed).state) > 0;'
              - lambda: |-
                  bool want_open = id(air_intake_target_open);
                  bool is_open = !id(tion_recirculation_current).state;
                  return want_open != is_open;
          then:
            - logger.log: "tion_intake_4s: periodic correction triggered"
            - if:
                condition:
                  lambda: 'return id(air_intake_target_open);'
                then:
                  - switch.turn_off: tion_recirculation_current
                else:
                  - switch.turn_on: tion_recirculation_current
