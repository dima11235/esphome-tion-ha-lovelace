# ESPHome-пакет для бризера Tion (https://github.com/dentra/esphome-tion)
# Репозиторий: https://github.com/dima11235/esphome-tion-ha-lovelace
#
# Опциональный пакет: Wi-Fi диагностика (RSSI, BSSID).
#
# Подключение (добавить к списку files в пакете tion_auto_mode):
#       - esphome/tion_others.yaml

### ESPHome package: utility sensors and diagnostics for the breezer

# Текстовый сенсор с информацией о текущей точке доступа
text_sensor:
  - platform: wifi_info
    bssid:
      name: "Wi-Fi BSSID"

# Сенсор уровня сигнала Wi-Fi для диагностики связи
sensor:
  - platform: wifi_signal
    name: "Wi-Fi RSSI"
    update_interval: 60s
