# ESPHome-пакет для бризера Tion (https://github.com/dentra/esphome-tion)
# Репозиторий: https://github.com/dima11235/esphome-tion-ha-lovelace
#
# Основной пакет: автоматическое управление скоростью бризера по уровню CO₂.
#
# Что делает:
#   - Читает CO₂ из внешнего сенсора HA (entity_id задаётся через substitution).
#   - PID-контроллер вычисляет нужную скорость вентилятора по отклонению CO₂
#     от целевого значения (target_co2). Используется режим COOL: рост CO₂ →
#     рост выходного сигнала → рост скорости.
#   - Скорость зажимается в диапазон [min_fan_speed, max_fan_speed].
#     Если min == max — PID отключается, скорость фиксируется.
#   - Если CO₂ недоступен (NAN) или вне диапазона 350..6000 ppm — PID не
#     меняет скорость, бризер удерживает текущую до восстановления показаний.
#     Ручная правка min/max при этом применяется к железу напрямую.
#   - В тихом режиме (silent_mode) скорость фиксируется на 1.
#   - Все команды к бризеру проходят через script set_fan_speed, который
#     отправляет climate.control только при изменении скорости.
#
# Синхронизация состояния (событийная, без поллинга):
#   - tion_climate_current (internal дубликат климата) → on_state:
#       · heater_mode   — синхронизируется (publish_state) при смене HEAT/FAN_ONLY
#       · heater_temperature — синхронизируется при смене целевой температуры в железе
#       · power_mode OFF — при mode == OFF от пульта (надёжный сигнал выключения,
#         в отличие от fan == 0, который бывает и у работающего бризера)
#       · power_mode ON  — при mode != OFF и fan > 0 (бризер включили с пульта)
#   - current_fan_speed → on_value:
#       · скорость от железа сравнивается с last_set_speed (последним, что
#         отправил алгоритм). Расхождение при speed > 0 = пульт сменил скорость
#         → min = max = speed, PID off.
#   - окно устаканивания (fan_speed_settle_until) гасит ложные срабатывания от эха:
#     после нашей команды железо несколько секунд отдаёт ещё старое состояние.
#     last_set_speed != 0 отличает выключение пультом от «0 выставили мы сами».
#   - min_fan_speed.set_action / max_fan_speed.set_action:
#       · PID включается (COOL) если min != max и power включён
#       · PID выключается (OFF) если min == max
#
# Создаёт сущности в HA (префикс = esphome: name):
#   switch.power_mode          — включение / выключение бризера
#   switch.heater_mode         — режим нагрева воздуха
#   switch.silent_mode         — тихий режим (скорость 1)
#   number.heater_temperature  — целевая температура нагрева, °C
#   number.target_co2          — целевой уровень CO₂, ppm
#   number.min_fan_speed       — нижняя граница скорости (0–6)
#   number.max_fan_speed       — верхняя граница скорости (0–6)
#   sensor.fan_speed           — текущая скорость вентилятора
#   sensor.current_co2         — текущий CO₂ (зеркало внешнего сенсора)
#   sensor.target_co2_sensor   — целевой CO₂ (для отображения на графиках)
#
# Требует:
#   substitutions.auto_mode_co2_sensor — entity_id сенсора CO₂ в HA
#   climate.tion_climate               — климат бризера от dentra/esphome-tion
#
# Подключение:
#
# substitutions:
#   auto_mode_co2_sensor: sensor.living_room_co2  # entity_id сенсора CO₂ в HA
#
# packages:
#   tion_auto_mode:
#     url: https://github.com/dima11235/esphome-tion-ha-lovelace
#     ref: main
#     refresh: 0s
#     files:
#       - esphome/tion_auto_mode.yaml   # Автоматическое управление скоростью по CO₂ (этот файл)
#       - esphome/tion_others.yaml      # Wi-Fi диагностика (опционально)

### ESPHome package: Automatic fan control for Tion breezer (CO2 driven)

# ---------------------------------------------------------------------------
# Защита от ложного выключения power_mode после рестарта HA / ребута ESP.
#
# Симптом: после перезагрузки бризер мог остаться выключенным и не включиться.
# Причина: при старте power_mode восстанавливается в ON и его turn_on_action
# выполняется СЛИШКОМ РАНО — железо Tion (UART/BLE) ещё не готово, команда
# включения теряется. Железо затем поднимается выключенным (mode == OFF, fan 0),
# а обработчик tion_climate_current.on_state трактует этот OFF как «выключение
# с пульта» и гасит power_mode. Самовосстановления нет — ветка включения в
# on_state требует fan > 0, чего при выключенном бризере не происходит.
#
# Фикс:
#   - on_boot (после готовности железа): взвести окно устаканивания, чтобы
#     on_state не принял начальный OFF за пульт, и ПЕРЕ-ПРИМЕНИТЬ включение,
#     если power_mode восстановлен в ON, но железо поднялось выключенным;
#   - on_client_connected: то же окно — на случай churn при переподключении HA.
# ---------------------------------------------------------------------------
esphome:
  on_boot:
    # Низкий приоритет: выполняется после инициализации компонентов.
    - priority: -100
      then:
        # Даём tion-компоненту установить связь с железом и отдать реальное
        # состояние, прежде чем принимать решения по power_mode.
        - delay: 10s
        - globals.set:
            id: fan_speed_settle_until
            value: !lambda 'return millis() + 30000;'
        - if:
            condition:
              switch.is_on: power_mode
            then:
              # power_mode говорит «включён». Если железо после старта оказалось
              # выключенным (fan 0) — пере-применяем включение, иначе бризер
              # останется off, а on_state позже погасит и сам power_mode.
              - if:
                  condition:
                    lambda: 'return int(id(current_fan_speed).state) == 0;'
                  then:
                    - script.execute:
                        id: set_fan_speed
                        fan_speed: !lambda 'return int(id(min_fan_speed).state);'
              - script.execute:
                  id: sync_pid_mode
                  min: !lambda 'return int(id(min_fan_speed).state);'
                  max: !lambda 'return int(id(max_fan_speed).state);'

api:
  on_client_connected:
    # Реконнект HA может совпасть с churn состояния — короткое окно не даёт
    # on_state принять переходный OFF за выключение с пульта.
    - globals.set:
        id: fan_speed_settle_until
        value: !lambda 'return millis() + 15000;'

globals:
  # Последняя скорость, которую алгоритм отправил на бризер.
  # Если железо сообщает другое значение — значит, скорость изменили с пульта.
  - id: last_set_speed
    type: int
    restore_value: yes
    initial_value: '-1'

  # millis() до которого on_value НЕ интерпретирует расхождение как «пульт».
  # Взводится при отправке команды смены скорости: пока железо догоняет команду,
  # оно несколько секунд эхит ещё старую скорость. Без этого окна такой эхо-отчёт
  # ложно опознавался бы как ручное изменение с пульта → min=max=старая, PID off.
  # Тот же приём, что settle_until в tion_intake_3s/4s.yaml.
  - id: fan_speed_settle_until
    type: uint32_t
    restore_value: no
    initial_value: '0'

# Сенсоры: текущая скорость, показания CO₂ и производное целевое значение
sensor:
  # Текущая скорость вентилятора — читается напрямую с бризера через Tion-компонент.
  # on_value ловит ТОЛЬКО смену скорости с пульта (speed > 0). Выключение бризера
  # обрабатывается в climate.on_state по mode == OFF — это надёжный сигнал, тогда как
  # fan == 0 бывает и при работающем бризере (PID остановил вентилятор).
  #
  # Логика: скорость от железа сравнивается с last_set_speed (последним, что отправил
  # алгоритм). Расхождение = пульт сменил скорость → min = max = speed, PID off.
  #
  # Окно устаканивания (fan_speed_settle_until): после нашей команды железо
  # несколько секунд эхит ещё старую скорость, пока догоняет команду. В этом окне
  # расхождение игнорируем — иначе наш же эхо-отчёт ложно опознавался бы как пульт.
  - platform: tion
    name: "Fan Speed"
    type: fan_speed
    id: current_fan_speed
    icon: "mdi:fan"
    state_class: "measurement"
    accuracy_decimals: 0
    on_value:
      then:
        - if:
            condition:
              and:
                # расхождение с нашим намерением = действие пультом...
                - lambda: 'return int(x) != id(last_set_speed);'
                # ...но только вне окна устаканивания (иначе это эхо нашей команды)
                - lambda: 'return millis() >= id(fan_speed_settle_until);'
                # speed 0 — это не смена скорости, а остановка/выключение;
                # выключение обрабатывается в on_state по mode == OFF
                - lambda: 'return int(x) > 0;'
                # в тихом режиме смену скорости с пульта игнорируем: silent_mode
                # всё равно держит 1 и перебьёт её при следующем обновлении CO₂.
                # Тронуть min/max здесь — испортить диапазон, к которому вернёмся
                # при выключении silent_mode.
                - switch.is_off: silent_mode
            then:
              # синхронизируем намерение с фактом, чтобы повторные отчёты железа
              # с этой же скоростью больше не считались действием пультом
              - globals.set:
                  id: last_set_speed
                  value: !lambda 'return int(x);'
              # пульт сменил скорость → фиксируем её: min = max = speed, PID off
              - lambda: |-
                  id(min_fan_speed).publish_state(x);
                  id(max_fan_speed).publish_state(x);
              - script.execute:
                  id: sync_pid_mode
                  min: !lambda 'return int(x);'
                  max: !lambda 'return int(x);'

  # Текущий CO₂ — зеркало внешнего сенсора из HA; используется как вход для PID.
  # internal: false ОБЯЗАТЕЛЬНО: для platform: homeassistant дефолт — internal: true
  # (эти сенсоры по дизайну — входы для логики ESPHome, не публикуются обратно в HA).
  # Без этой строки sensor.{node}_current_co2 не появится в HA, и карточка/график не увидят его.
  - platform: homeassistant
    name: "Current CO2"
    id: current_co2
    entity_id: ${auto_mode_co2_sensor}
    unit_of_measurement: "ppm"
    icon: "mdi:molecule-co2"
    device_class: "carbon_dioxide"
    state_class: "measurement"
    accuracy_decimals: 0
    internal: false

  # Целевой CO₂ как sensor — зеркало number.target_co2 для отображения на графиках.
  #
  # Зачем нужен отдельный sensor, если есть number.target_co2:
  #   - в исторических графиках HA (history-graph, ApexCharts) sensor рисуется
  #     как непрерывная линия, а number — как ступенчатая или вовсе не рисуется
  #     в зависимости от карточки/версии HA;
  #   - сенсор с device_class=carbon_dioxide и state_class=measurement
  #     встаёт на одну ось с sensor.current_co2 на графике без доп. настроек;
  #   - force_update: true + update_interval: 60s гарантирует регулярные
  #     точки данных, чтобы линия уставки была непрерывной даже когда
  #     значение не меняется (иначе график «обрывается»).
  #
  # Это сознательное дублирование данных ради UX графиков — оставлено намеренно.
  - platform: template
    name: "Target CO2 Sensor"
    id: target_co2_sensor
    unit_of_measurement: "ppm"
    icon: "mdi:molecule-co2"
    device_class: "carbon_dioxide"
    state_class: "measurement"
    accuracy_decimals: 0
    update_interval: 60s
    force_update: true
    lambda: |-
      return id(target_co2).state;

# Внутренний дубликат tion_climate — для получения on_state при любом изменении состояния железа.
# По той же схеме что tion_air_intake_current в tion_intake_3s.yaml.
climate:
  - platform: tion
    id: tion_climate_current
    internal: true
    on_state:
      # Синхронизация heater_mode с железом через publish_state, а НЕ turn_on/off.
      # turn_on/off heater_mode безусловно включают power_mode (намеренно — для
      # ручного нажатия на карточке). Но здесь это лишь отражение состояния железа:
      # если при выключении бризер проходит через промежуточный HEAT↔FAN_ONLY,
      # turn_on/off включил бы power_mode обратно. publish_state меняет состояние
      # switch без выполнения его action — ручное нажатие на карточке не затронуто.
      - if:
          condition:
            and:
              - lambda: 'return id(tion_climate_current).mode == CLIMATE_MODE_HEAT;'
              - switch.is_off: heater_mode
          then:
            - logger.log: "climate.tion_climate_current: on_state: set heater_mode on"
            - lambda: 'id(heater_mode).publish_state(true);'
      - if:
          condition:
            and:
              - lambda: 'return id(tion_climate_current).mode == CLIMATE_MODE_FAN_ONLY;'
              - switch.is_on: heater_mode
          then:
            - logger.log: "climate.tion_climate_current: on_state: set heater_mode off"
            - lambda: 'id(heater_mode).publish_state(false);'
      # heater_temperature синхронизируется ТОЛЬКО когда железо в режиме HEAT —
      # это сознательное ограничение под специфику пульта и протокола Tion:
      #   - в режиме FAN_ONLY поле target_temperature в пакете состояния
      #     может содержать неактуальное / промежуточное значение
      #     (зависит от модели и прошивки бризера), синхронизировать его
      #     в этот момент нельзя — иначе number.heater_temperature сбросится
      #     на мусорное значение.
      #   - корректное target_temperature гарантированно публикуется только
      #     в режиме HEAT — там его и подхватываем.
      #   - сценарий «температуру изменили в FAN_ONLY с пульта» решается
      #     отложенно: при следующем переключении в HEAT on_state снова
      #     сработает с уже актуальным значением.
      - if:
          condition:
            and:
              - lambda: 'return id(tion_climate_current).mode == CLIMATE_MODE_HEAT;'
              - lambda: 'return id(tion_climate_current).target_temperature != id(heater_temperature).state;'
          then:
            - logger.log: "climate.tion_climate_current: on_state: set heater_temperature"
            - number.set:
                id: heater_temperature
                value: !lambda 'return id(tion_climate_current).target_temperature;'
      # Выключение бризера с пульта: надёжный сигнал — mode == OFF (а НЕ fan == 0,
      # который бывает и при работающем бризере, когда PID остановил вентилятор).
      #   - last_set_speed != 0: отличает выключение пультом от ситуации «0 выставили
      #     мы сами» (power_mode.turn_off или PID при min=0) — там power трогать не надо.
      #   - settle: внутри окна mode == OFF может быть эхом нашей же команды (например,
      #     эхо старого OFF сразу после включения) — игнорируем.
      - if:
          condition:
            and:
              - lambda: 'return id(tion_climate_current).mode == CLIMATE_MODE_OFF;'
              - switch.is_on: power_mode
              - lambda: 'return id(last_set_speed) != 0;'
              - lambda: 'return millis() >= id(fan_speed_settle_until);'
          then:
            - logger.log: "climate.tion_climate_current: on_state: turn power_mode off (remote)"
            - switch.turn_off: power_mode
      # Включение бризера с пульта: mode != OFF и вентилятор реально крутится.
      #   - fan_speed > 0: переходное состояние при выключении (mode ещё не OFF,
      #     но fan уже 0) не должно ложно включать power_mode обратно.
      #   - settle: эхо старого рабочего состояния сразу после нашего выключения
      #     не должно включать бризер заново.
      - if:
          condition:
            and:
              - lambda: 'return id(tion_climate_current).mode != CLIMATE_MODE_OFF;'
              - lambda: 'return int(id(current_fan_speed).state) > 0;'
              - lambda: 'return millis() >= id(fan_speed_settle_until);'
              - switch.is_off: power_mode
          then:
            - logger.log: "climate.tion_climate_current: on_state: turn power_mode on"
            - switch.turn_on: power_mode

# PID-контроллер управляет скоростью бризера в автоматическом режиме.
# Режим COOL: CO₂ > target → output растёт → скорость растёт (аналог охлаждения).
# output_averaging_samples сглаживает резкие изменения скорости.
  - platform: pid
    id: pid_co2
    internal: true
    name: "PID CO2 Controller"
    sensor: current_co2
    default_target_temperature: 750
    cool_output: output_fan_speed
    control_parameters:
      ki: 0.00001
      kd: 0.0
      max_integral: 0.0
      kp: 0.005
      min_integral: -0.167
      output_averaging_samples: 3

# Получает выход PID (float 0..1) и переводит в скорость вентилятора (int 0..6),
# зажатую в диапазон [min_fan_speed, max_fan_speed].
# Если включён silent_mode — всегда устанавливает скорость 1.
# Если power_mode выключен — ничего не делает.
output:
  - platform: template
    id: output_fan_speed
    type: float
    write_action:
      - logger.log: "output.output_fan_speed: write_action"
      - if:
          condition:
            switch.is_on: power_mode
          then:
            - if:
                condition:
                  switch.is_on: silent_mode
                then:
                  - script.execute:
                      id: set_fan_speed
                      fan_speed: 1
                else:
                  # PID-скорость применяется ТОЛЬКО при достоверном CO₂ и
                  # активном PID (mode == COOL).
                  #   - CO₂: если сенсор недоступен (NAN) или вернул
                  #     неправдоподобное значение (вне 350..6000 ppm) — команд
                  #     не шлём, бризер удерживает текущую скорость.
                  #   - pid_co2 == COOL ОБЯЗАТЕЛЬНО: выключение PID (climate.control
                  #     pid_co2 OFF, например в power_mode.turn_off_action) само
                  #     триггерит write_action. Без этой проверки в фиксированном
                  #     режиме (min==max) clamp дал бы min==max и set_fan_speed
                  #     снова включил бы бризер при выключении. Выход выключенного
                  #     PID применять нельзя.
                  # Ручное изменение min/max идёт мимо этой ветки, напрямую через
                  # set_fan_speed в number.set_action.
                  - if:
                      condition:
                        and:
                          - lambda: |-
                              const float co2 = id(current_co2).state;
                              return !std::isnan(co2) && co2 >= 350.0f && co2 <= 6000.0f;
                          - lambda: 'return id(pid_co2).mode == CLIMATE_MODE_COOL;'
                      then:
                        - script.execute:
                            id: set_fan_speed
                            fan_speed: !lambda |-
                              const int min_speed = static_cast<int>(std::lround(id(min_fan_speed).state));
                              const int max_speed = static_cast<int>(std::lround(id(max_fan_speed).state));
                              const int requested = static_cast<int>(std::lround(6.0f * state));
                              return std::max<int>(min_speed, std::min<int>(max_speed, requested));

# Применяет скорость к tion_climate_current только если она изменилась —
# чтобы не слать лишние команды бризеру при каждом срабатывании PID.
# При fan_speed > 0 передаёт режим (HEAT/FAN_ONLY) и температуру нагрева.
# При fan_speed == 0 переводит климат в режим OFF.
# Каждый вызов фиксирует намерение в last_set_speed — это «эталон», с которым
# on_value сравнивает отчёты железа, чтобы отличить наши команды от пульта.
script:
  - id: set_fan_speed
    parameters:
      fan_speed: int
    then:
      - logger.log: "script.set_fan_speed"
      # Фиксируем намерение ДО проверки изменения: даже если команда не уйдёт
      # (скорость уже верная), last_set_speed должен отражать, что мы «хотели».
      - globals.set:
          id: last_set_speed
          value: !lambda 'return fan_speed;'
      - if:
          condition:
            lambda: 'return fan_speed != int(id(current_fan_speed).state);'
          then:
            # Реально меняем скорость → взводим окно устаканивания: пока железо
            # догоняет команду и эхит старую скорость, on_value не примет эхо за пульт.
            # Взводим ТОЛЬКО здесь (не выше): иначе регулярные вызовы PID без смены
            # скорости держали бы окно открытым вечно и пульт не детектировался бы.
            - globals.set:
                id: fan_speed_settle_until
                value: !lambda 'return millis() + 5000;'
            - if:
                condition:
                  lambda: 'return fan_speed > 0;'
                then:
                  - climate.control:
                      id: tion_climate_current
                      mode: !lambda 'return id(heater_mode).state ? CLIMATE_MODE_HEAT : CLIMATE_MODE_FAN_ONLY;'
                      custom_fan_mode: !lambda 'return to_string(fan_speed);'
                      target_temperature: !lambda 'return id(heater_temperature).state;'
                else:
                  - climate.control:
                      id: tion_climate_current
                      mode: 'OFF'

  # sync_pid_mode — выбирает корректный режим pid_co2 для заданного диапазона скоростей.
  # Правило: min != max → PID нужен (COOL), иначе PID не нужен (OFF, скорость фиксирована).
  # Предусловие: вызывать только когда power_mode ON. Проверка остаётся в месте вызова.
  # Параметры min/max передаются явно, потому что при вызове из number.set_action
  # state самого number ещё содержит старое значение (optimistic publish после action).
  - id: sync_pid_mode
    parameters:
      min: int
      max: int
    then:
      - logger.log: "script.sync_pid_mode"
      - if:
          condition:
            lambda: 'return min != max;'
          then:
            - if:
                condition:
                  lambda: 'return id(pid_co2).mode != CLIMATE_MODE_COOL;'
                then:
                  - climate.control: { id: pid_co2, mode: 'COOL' }
          else:
            - if:
                condition:
                  lambda: 'return id(pid_co2).mode != CLIMATE_MODE_OFF;'
                then:
                  - climate.control: { id: pid_co2, mode: 'OFF' }

# Переключатели управления питанием, режимами обогрева и тихим режимом
switch:
  # power_mode — главный переключатель. Включение запускает PID (если min != max)
  # или фиксирует скорость на min_fan_speed (если min == max). Выключение → скорость 0.
  #
  # Если бризер уже работает (fan_speed > 0) — это означает синхронизацию состояния
  # с уже включённым железом (например, бризер включили с пульта). В этом случае
  # set_fan_speed не вызывается, чтобы сохранить реальную скорость с железа,
  # а не сбрасывать её на min_fan_speed.
  - platform: template
    name: "Power Mode"
    icon: "mdi:power"
    id: power_mode
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - logger.log: "switch.power_mode: turn_on_action"
      - if:
          condition:
            lambda: 'return int(id(current_fan_speed).state) == 0;'
          then:
            - script.execute:
                id: set_fan_speed
                fan_speed: !lambda 'return int(id(min_fan_speed).state);'
      - script.execute:
          id: sync_pid_mode
          min: !lambda 'return int(id(min_fan_speed).state);'
          max: !lambda 'return int(id(max_fan_speed).state);'
    turn_off_action:
      - logger.log: "switch.power_mode: turn_off_action"
      # Взводим окно устаканивания: после выключения железо несколько секунд
      # эхит ещё старое рабочее состояние (mode != OFF, fan > 0). Без этого окна
      # on_state включал бы power_mode обратно. set_fan_speed ниже взведёт окно
      # только если реально пошлёт команду (current != 0), поэтому взводим явно.
      - globals.set:
          id: fan_speed_settle_until
          value: !lambda 'return millis() + 5000;'
      - climate.control:
          id: pid_co2
          mode: 'OFF'
      - script.execute:
          id: set_fan_speed
          fan_speed: 0

  # heater_mode — выбор между двумя рабочими режимами бризера: HEAT (нагрев) и FAN_ONLY (вентиляция).
  #
  # Принцип: heater_mode не выключает бризер. Оба положения переключателя
  # соответствуют РАБОТАЮЩЕМУ бризеру — просто с разным режимом обработки воздуха:
  #   ON  → бризер работает в режиме нагрева (HEAT)
  #   OFF → бризер работает в режиме вентиляции (FAN_ONLY)
  # Поэтому turn_on_action и turn_off_action оба включают power_mode —
  # любое осознанное переключение режима подразумевает, что бризер должен работать.
  # Если до переключения бризер был выключен — он включится с min_fan_speed.
  #
  # Для выключения бризера использовать power_mode, а не heater_mode.
  - platform: template
    name: "Heater Mode"
    icon: "mdi:fire"
    id: heater_mode
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - logger.log: "switch.heater_mode: turn_on_action"
      - if:
          condition:
            lambda: 'return id(tion_climate_current).mode == CLIMATE_MODE_FAN_ONLY && int(id(current_fan_speed).state) > 0;'
          then:
            - climate.control: { id: tion_climate_current, mode: "HEAT" }
      - switch.turn_on: power_mode
    turn_off_action:
      - logger.log: "switch.heater_mode: turn_off_action"
      - if:
          condition:
            lambda: 'return id(tion_climate_current).mode == CLIMATE_MODE_HEAT && int(id(current_fan_speed).state) > 0;'
          then:
            - climate.control: { id: tion_climate_current, mode: "FAN_ONLY" }
      - switch.turn_on: power_mode

  # silent_mode — фиксирует скорость на 1 поверх PID.
  # При выключении возвращает скорость к min_fan_speed.
  # При включении дополнительно выключает PID, чтобы он не накапливал integral
  # пока его выход игнорируется. При выключении — восстанавливает режим PID
  # через sync_pid_mode (COOL/OFF в зависимости от min/max).
  - platform: template
    name: "Silent Mode"
    icon: "mdi:weather-night"
    id: silent_mode
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - logger.log: "switch.silent_mode: turn_on_action"
      - if:
          condition:
            switch.is_on: power_mode
          then:
            - script.execute:
                id: set_fan_speed
                fan_speed: 1
            - if:
                condition:
                  lambda: 'return id(pid_co2).mode != CLIMATE_MODE_OFF;'
                then:
                  - climate.control: { id: pid_co2, mode: 'OFF' }
    on_turn_off:
      - logger.log: "switch.silent_mode: turn_off_action"
      - if:
          condition:
            switch.is_on: power_mode
          then:
            - script.execute:
                id: set_fan_speed
                fan_speed: !lambda 'return int(id(min_fan_speed).state);'
            - script.execute:
                id: sync_pid_mode
                min: !lambda 'return int(id(min_fan_speed).state);'
                max: !lambda 'return int(id(max_fan_speed).state);'

# Числовые сущности для задания целевого CO₂, температуры нагрева и допустимого диапазона скоростей
number:
  # heater_temperature — применяется немедленно только при работающем бризере
  - platform: template
    name: "Heater Temperature"
    icon: "mdi:thermometer"
    id: heater_temperature
    unit_of_measurement: "°C"
    device_class: "temperature"
    min_value: 0
    max_value: 30
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 20
    set_action:
      - logger.log: "number.heater_temperature: set_action"
      - if:
          condition:
            lambda: 'return x != id(tion_climate_current).target_temperature && int(id(current_fan_speed).state) > 0;'
          then:
            - climate.control:
                id: tion_climate_current
                target_temperature: !lambda 'return x;'

  # target_co2 — уставка PID-контроллера; применяется немедленно если PID включён
  - platform: template
    name: "Target CO2"
    id: target_co2
    unit_of_measurement: "ppm"
    icon: "mdi:molecule-co2"
    device_class: "carbon_dioxide"
    min_value: 400
    max_value: 1200
    step: 50
    optimistic: true
    restore_value: true
    initial_value: 750
    set_action:
      - logger.log: "number.target_co2: set_action"
      - if:
          condition:
            lambda: 'return x != id(pid_co2).target_temperature;'
          then:
            - climate.control:
                id: pid_co2
                target_temperature: !lambda 'return x;'

  # min_fan_speed — нижняя граница диапазона. Если новое min > max, поднимает max следом.
  # Если min == max — PID отключается (фиксированная скорость).
  # Немедленно применяет скорость, если бризер работает и текущая скорость ниже нового min.
  - platform: template
    name: "Min Fan Speed"
    icon: "mdi:fan"
    id: min_fan_speed
    min_value: 0
    max_value: 6
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 1
    set_action:
      - logger.log: "number.min_fan_speed: set_action"
      - if:
          condition:
            lambda: 'return x > id(max_fan_speed).state;'
          then:
            - number.set:
                id: max_fan_speed
                value: !lambda 'return x;'
      - if:
          condition:
            and:
              - switch.is_on: power_mode
              - switch.is_off: silent_mode
              - lambda: 'return x > int(id(current_fan_speed).state);'
          then:
            - script.execute:
                id: set_fan_speed
                fan_speed: !lambda 'return x;'
      - if:
          condition:
            switch.is_on: power_mode
          then:
            - script.execute:
                id: sync_pid_mode
                min: !lambda 'return int(x);'
                max: !lambda 'return int(id(max_fan_speed).state);'

  # max_fan_speed — верхняя граница диапазона. Если новый max < min, опускает min следом.
  # Немедленно применяет скорость, если бризер работает и текущая скорость выше нового max.
  - platform: template
    name: "Max Fan Speed"
    icon: "mdi:fan"
    id: max_fan_speed
    min_value: 0
    max_value: 6
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 2
    set_action:
      - logger.log: "number.max_fan_speed: set_action"
      - if:
          condition:
            lambda: 'return x < id(min_fan_speed).state;'
          then:
            - number.set:
                id: min_fan_speed
                value: !lambda 'return x;'
      - if:
          condition:
            and:
              - switch.is_on: power_mode
              - switch.is_off: silent_mode
              - lambda: 'return x < int(id(current_fan_speed).state);'
          then:
            - script.execute:
                id: set_fan_speed
                fan_speed: !lambda 'return x;'
      - if:
          condition:
            switch.is_on: power_mode
          then:
            - script.execute:
                id: sync_pid_mode
                min: !lambda 'return int(id(min_fan_speed).state);'
                max: !lambda 'return int(x);'
