# ESPHome-пакет для бризера Tion (https://github.com/dentra/esphome-tion)
# Репозиторий: https://github.com/dima11235/esphome-tion-ha-lovelace
#
# Основной пакет: автоматическое управление скоростью бризера по уровню CO₂.
#
# Что делает:
#   - Читает CO₂ из внешнего сенсора HA (entity_id задаётся через substitution).
#   - PID-контроллер вычисляет нужную скорость вентилятора по отклонению CO₂
#     от целевого значения (target_co2). Используется режим COOL: рост CO₂ →
#     рост выходного сигнала → рост скорости.
#   - Скорость зажимается в диапазон [min_fan_speed, max_fan_speed].
#     Если min == max — PID отключается, скорость фиксируется.
#   - В тихом режиме (silent_mode) скорость фиксируется на 1.
#   - Все команды к бризеру проходят через script set_fan_speed, который
#     отправляет climate.control только при изменении скорости.
#
# Синхронизация состояния (событийная, без поллинга):
#   - tion_climate_current (internal дубликат климата) → on_state:
#       · heater_mode   — синхронизируется при смене режима HEAT/FAN_ONLY в железе
#       · heater_temperature — синхронизируется при смене целевой температуры в железе
#       · power_mode    — включается если железо работает, а switch выключен
#   - min_fan_speed.set_action / max_fan_speed.set_action:
#       · PID включается (COOL) если min != max и power включён
#       · PID выключается (OFF) если min == max
#
# Создаёт сущности в HA (префикс = esphome: name):
#   switch.power_mode          — включение / выключение бризера
#   switch.heater_mode         — режим нагрева воздуха
#   switch.silent_mode         — тихий режим (скорость 1)
#   number.heater_temperature  — целевая температура нагрева, °C
#   number.target_co2          — целевой уровень CO₂, ppm
#   number.min_fan_speed       — нижняя граница скорости (0–6)
#   number.max_fan_speed       — верхняя граница скорости (0–6)
#   sensor.fan_speed           — текущая скорость вентилятора
#   sensor.current_co2         — текущий CO₂ (зеркало внешнего сенсора)
#   sensor.target_co2_sensor   — целевой CO₂ (для отображения на графиках)
#
# Требует:
#   substitutions.auto_mode_co2_sensor — entity_id сенсора CO₂ в HA
#   climate.tion_climate               — климат бризера от dentra/esphome-tion
#
# Подключение:
#
# substitutions:
#   auto_mode_co2_sensor: sensor.living_room_co2  # entity_id сенсора CO₂ в HA
#
# packages:
#   tion_auto_mode:
#     url: https://github.com/dima11235/esphome-tion-ha-lovelace
#     ref: main
#     refresh: 0s
#     files:
#       - esphome/tion_auto_mode.yaml   # Автоматическое управление скоростью по CO₂ (этот файл)
#       - esphome/tion_others.yaml      # Wi-Fi диагностика (опционально)

### ESPHome package: Automatic fan control for Tion breezer (CO2 driven)


# Сенсоры: текущая скорость, показания CO₂ и производное целевое значение
sensor:
  # Текущая скорость вентилятора — читается напрямую с бризера через Tion-компонент
  - platform: tion
    name: "Fan Speed"
    type: fan_speed
    id: current_fan_speed
    icon: "mdi:fan"
    state_class: "measurement"
    accuracy_decimals: 0

  # Текущий CO₂ — зеркало внешнего сенсора из HA; используется как вход для PID
  - platform: homeassistant
    name: "Current CO2"
    id: current_co2
    entity_id: ${auto_mode_co2_sensor}
    unit_of_measurement: "ppm"
    icon: "mdi:molecule-co2"
    device_class: "carbon_dioxide"
    state_class: "measurement"
    accuracy_decimals: 0

  # Целевой CO₂ как сенсор — нужен только для отображения уставки на графиках рядом с current_co2
  - platform: template
    name: "Target CO2 Sensor"
    id: target_co2_sensor
    unit_of_measurement: "ppm"
    icon: "mdi:molecule-co2"
    device_class: "carbon_dioxide"
    state_class: "measurement"
    accuracy_decimals: 0
    update_interval: 60s
    force_update: true
    lambda: |-
      return id(target_co2).state;

# Внутренний дубликат tion_climate — для получения on_state при любом изменении состояния железа.
# По той же схеме что tion_air_intake_current в tion_intake_3s.yaml.
climate:
  - platform: tion
    id: tion_climate_current
    internal: true
    on_state:
      - if:
          condition:
            and:
              - lambda: 'return id(tion_climate_current).mode == CLIMATE_MODE_HEAT;'
              - switch.is_off: heater_mode
          then:
            - logger.log: "climate.tion_climate_current: on_state: set heater_mode on"
            - switch.turn_on: heater_mode
      - if:
          condition:
            and:
              - lambda: 'return id(tion_climate_current).mode == CLIMATE_MODE_FAN_ONLY;'
              - switch.is_on: heater_mode
          then:
            - logger.log: "climate.tion_climate_current: on_state: set heater_mode off"
            - switch.turn_off: heater_mode
      - if:
          condition:
            and:
              - lambda: 'return id(tion_climate_current).mode == CLIMATE_MODE_HEAT;'
              - lambda: 'return id(tion_climate_current).target_temperature != id(heater_temperature).state;'
          then:
            - logger.log: "climate.tion_climate_current: on_state: set heater_temperature"
            - number.set:
                id: heater_temperature
                value: !lambda 'return id(tion_climate_current).target_temperature;'
      - if:
          condition:
            and:
              - lambda: 'return id(tion_climate_current).mode != CLIMATE_MODE_OFF;'
              - switch.is_off: power_mode
          then:
            - logger.log: "climate.tion_climate_current: on_state: turn power_mode on"
            - switch.turn_on: power_mode
      - if:
          condition:
            and:
              - lambda: 'return id(tion_climate_current).mode == CLIMATE_MODE_OFF;'
              - switch.is_on: power_mode
          then:
            - logger.log: "climate.tion_climate_current: on_state: turn power_mode off"
            - switch.turn_off: power_mode

# PID-контроллер управляет скоростью бризера в автоматическом режиме.
# Режим COOL: CO₂ > target → output растёт → скорость растёт (аналог охлаждения).
# output_averaging_samples сглаживает резкие изменения скорости.
  - platform: pid
    id: pid_co2
    internal: true
    name: "PID CO2 Controller"
    sensor: current_co2
    default_target_temperature: 750
    cool_output: output_fan_speed
    control_parameters:
      ki: 0.00001
      kd: 0.0
      max_integral: 0.0
      kp: 0.005
      min_integral: -0.167
      output_averaging_samples: 3

# Получает выход PID (float 0..1) и переводит в скорость вентилятора (int 0..6),
# зажатую в диапазон [min_fan_speed, max_fan_speed].
# Если включён silent_mode — всегда устанавливает скорость 1.
# Если power_mode выключен — ничего не делает.
output:
  - platform: template
    id: output_fan_speed
    type: float
    write_action:
      - logger.log: "output.output_fan_speed: write_action"
      - if:
          condition:
            switch.is_on: power_mode
          then:
            - if:
                condition:
                  switch.is_on: silent_mode
                then:
                  - script.execute:
                      id: set_fan_speed
                      fan_speed: 1
                else:
                  - script.execute:
                      id: set_fan_speed
                      fan_speed: !lambda |-
                        const int min_speed = static_cast<int>(std::lround(id(min_fan_speed).state));
                        const int max_speed = static_cast<int>(std::lround(id(max_fan_speed).state));
                        const int requested = static_cast<int>(std::lround(6.0f * state));
                        return std::max<int>(min_speed, std::min<int>(max_speed, requested));

# Применяет скорость к tion_climate_current только если она изменилась —
# чтобы не слать лишние команды бризеру при каждом срабатывании PID.
# При fan_speed > 0 передаёт режим (HEAT/FAN_ONLY) и температуру нагрева.
# При fan_speed == 0 переводит климат в режим OFF.
script:
  - id: set_fan_speed
    parameters:
      fan_speed: int
    then:
      - logger.log: "script.set_fan_speed"
      - if:
          condition:
            lambda: 'return fan_speed != int(id(current_fan_speed).state);'
          then:
            - if:
                condition:
                  lambda: 'return fan_speed > 0;'
                then:
                  - climate.control:
                      id: tion_climate_current
                      mode: !lambda 'return id(heater_mode).state ? CLIMATE_MODE_HEAT : CLIMATE_MODE_FAN_ONLY;'
                      custom_fan_mode: !lambda 'return to_string(fan_speed);'
                      target_temperature: !lambda 'return id(heater_temperature).state;'
                else:
                  - climate.control:
                      id: tion_climate_current
                      mode: 'OFF'

  # sync_pid_mode — выбирает корректный режим pid_co2 для заданного диапазона скоростей.
  # Правило: min != max → PID нужен (COOL), иначе PID не нужен (OFF, скорость фиксирована).
  # Предусловие: вызывать только когда power_mode ON. Проверка остаётся в месте вызова.
  # Параметры min/max передаются явно, потому что при вызове из number.set_action
  # state самого number ещё содержит старое значение (optimistic publish после action).
  - id: sync_pid_mode
    parameters:
      min: int
      max: int
    then:
      - logger.log: "script.sync_pid_mode"
      - if:
          condition:
            lambda: 'return min != max;'
          then:
            - if:
                condition:
                  lambda: 'return id(pid_co2).mode != CLIMATE_MODE_COOL;'
                then:
                  - climate.control: { id: pid_co2, mode: 'COOL' }
          else:
            - if:
                condition:
                  lambda: 'return id(pid_co2).mode != CLIMATE_MODE_OFF;'
                then:
                  - climate.control: { id: pid_co2, mode: 'OFF' }

# Переключатели управления питанием, режимами обогрева и тихим режимом
switch:
  # power_mode — главный переключатель. Включение запускает PID (если min != max)
  # или фиксирует скорость на min_fan_speed (если min == max). Выключение → скорость 0.
  #
  # Если бризер уже работает (fan_speed > 0) — это означает синхронизацию состояния
  # с уже включённым железом (например, бризер включили с пульта). В этом случае
  # set_fan_speed не вызывается, чтобы сохранить реальную скорость с железа,
  # а не сбрасывать её на min_fan_speed.
  - platform: template
    name: "Power Mode"
    icon: "mdi:power"
    id: power_mode
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - logger.log: "switch.power_mode: turn_on_action"
      - if:
          condition:
            lambda: 'return int(id(current_fan_speed).state) == 0;'
          then:
            - script.execute:
                id: set_fan_speed
                fan_speed: !lambda 'return int(id(min_fan_speed).state);'
      - script.execute:
          id: sync_pid_mode
          min: !lambda 'return int(id(min_fan_speed).state);'
          max: !lambda 'return int(id(max_fan_speed).state);'
    turn_off_action:
      - logger.log: "switch.power_mode: turn_off_action"
      - climate.control:
          id: pid_co2
          mode: 'OFF'
      - script.execute:
          id: set_fan_speed
          fan_speed: 0

  # heater_mode — выбор между двумя рабочими режимами бризера: HEAT (нагрев) и FAN_ONLY (вентиляция).
  #
  # Принцип: heater_mode не выключает бризер. Оба положения переключателя
  # соответствуют РАБОТАЮЩЕМУ бризеру — просто с разным режимом обработки воздуха:
  #   ON  → бризер работает в режиме нагрева (HEAT)
  #   OFF → бризер работает в режиме вентиляции (FAN_ONLY)
  # Поэтому turn_on_action и turn_off_action оба включают power_mode —
  # любое осознанное переключение режима подразумевает, что бризер должен работать.
  # Если до переключения бризер был выключен — он включится с min_fan_speed.
  #
  # Для выключения бризера использовать power_mode, а не heater_mode.
  - platform: template
    name: "Heater Mode"
    icon: "mdi:fire"
    id: heater_mode
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - logger.log: "switch.heater_mode: turn_on_action"
      - if:
          condition:
            lambda: 'return id(tion_climate_current).mode == CLIMATE_MODE_FAN_ONLY && int(id(current_fan_speed).state) > 0;'
          then:
            - climate.control: { id: tion_climate_current, mode: "HEAT" }
      - switch.turn_on: power_mode
    turn_off_action:
      - logger.log: "switch.heater_mode: turn_off_action"
      - if:
          condition:
            lambda: 'return id(tion_climate_current).mode == CLIMATE_MODE_HEAT && int(id(current_fan_speed).state) > 0;'
          then:
            - climate.control: { id: tion_climate_current, mode: "FAN_ONLY" }
      - switch.turn_on: power_mode

  # silent_mode — фиксирует скорость на 1 поверх PID.
  # При выключении возвращает скорость к min_fan_speed.
  # При включении дополнительно выключает PID, чтобы он не накапливал integral
  # пока его выход игнорируется. При выключении — восстанавливает режим PID
  # через sync_pid_mode (COOL/OFF в зависимости от min/max).
  - platform: template
    name: "Silent Mode"
    icon: "mdi:weather-night"
    id: silent_mode
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - logger.log: "switch.silent_mode: turn_on_action"
      - if:
          condition:
            switch.is_on: power_mode
          then:
            - script.execute:
                id: set_fan_speed
                fan_speed: 1
            - if:
                condition:
                  lambda: 'return id(pid_co2).mode != CLIMATE_MODE_OFF;'
                then:
                  - climate.control: { id: pid_co2, mode: 'OFF' }
    on_turn_off:
      - logger.log: "switch.silent_mode: turn_off_action"
      - if:
          condition:
            switch.is_on: power_mode
          then:
            - script.execute:
                id: set_fan_speed
                fan_speed: !lambda 'return id(min_fan_speed).state;'
            - script.execute:
                id: sync_pid_mode
                min: !lambda 'return int(id(min_fan_speed).state);'
                max: !lambda 'return int(id(max_fan_speed).state);'

# Числовые сущности для задания целевого CO₂, температуры нагрева и допустимого диапазона скоростей
number:
  # heater_temperature — применяется немедленно только при работающем бризере
  - platform: template
    name: "Heater Temperature"
    icon: "mdi:thermometer"
    id: heater_temperature
    unit_of_measurement: "°C"
    device_class: "temperature"
    min_value: 0
    max_value: 30
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 20
    set_action:
      - logger.log: "number.heater_temperature: set_action"
      - if:
          condition:
            lambda: 'return x != id(tion_climate_current).target_temperature && int(id(current_fan_speed).state) > 0;'
          then:
            - climate.control:
                id: tion_climate_current
                target_temperature: !lambda 'return x;'

  # target_co2 — уставка PID-контроллера; применяется немедленно если PID включён
  - platform: template
    name: "Target CO2"
    id: target_co2
    unit_of_measurement: "ppm"
    icon: "mdi:molecule-co2"
    device_class: "carbon_dioxide"
    min_value: 400
    max_value: 1200
    step: 50
    optimistic: true
    restore_value: true
    initial_value: 750
    set_action:
      - logger.log: "number.target_co2: set_action"
      - if:
          condition:
            lambda: 'return x != id(pid_co2).target_temperature;'
          then:
            - climate.control:
                id: pid_co2
                target_temperature: !lambda 'return x;'

  # min_fan_speed — нижняя граница диапазона. Если новое min > max, поднимает max следом.
  # Если min == max — PID отключается (фиксированная скорость).
  # Немедленно применяет скорость, если бризер работает и текущая скорость ниже нового min.
  - platform: template
    name: "Min Fan Speed"
    icon: "mdi:fan"
    id: min_fan_speed
    min_value: 0
    max_value: 6
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 1
    set_action:
      - logger.log: "number.min_fan_speed: set_action"
      - if:
          condition:
            lambda: 'return x > id(max_fan_speed).state;'
          then:
            - number.set:
                id: max_fan_speed
                value: !lambda 'return x;'
      - if:
          condition:
            and:
              - switch.is_on: power_mode
              - switch.is_off: silent_mode
              - lambda: 'return x > int(id(current_fan_speed).state);'
          then:
            - script.execute:
                id: set_fan_speed
                fan_speed: !lambda 'return x;'
      - if:
          condition:
            switch.is_on: power_mode
          then:
            - script.execute:
                id: sync_pid_mode
                min: !lambda 'return int(x);'
                max: !lambda 'return int(id(max_fan_speed).state);'

  # max_fan_speed — верхняя граница диапазона. Если новый max < min, опускает min следом.
  # Немедленно применяет скорость, если бризер работает и текущая скорость выше нового max.
  - platform: template
    name: "Max Fan Speed"
    icon: "mdi:fan"
    id: max_fan_speed
    min_value: 0
    max_value: 6
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 2
    set_action:
      - logger.log: "number.max_fan_speed: set_action"
      - if:
          condition:
            lambda: 'return x < id(min_fan_speed).state;'
          then:
            - number.set:
                id: min_fan_speed
                value: !lambda 'return x;'
      - if:
          condition:
            and:
              - switch.is_on: power_mode
              - switch.is_off: silent_mode
              - lambda: 'return x < int(id(current_fan_speed).state);'
          then:
            - script.execute:
                id: set_fan_speed
                fan_speed: !lambda 'return x;'
      - if:
          condition:
            switch.is_on: power_mode
          then:
            - script.execute:
                id: sync_pid_mode
                min: !lambda 'return int(id(min_fan_speed).state);'
                max: !lambda 'return int(x);'
