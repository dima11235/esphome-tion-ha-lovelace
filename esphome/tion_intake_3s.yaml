# ESPHome-пакет для бризера Tion (https://github.com/dentra/esphome-tion)
# Репозиторий: https://github.com/dima11235/esphome-tion-ha-lovelace
#
# Пакет управления воздушной заслонкой для Tion 3S.
#
# Что делает:
#   - Добавляет в HA переключатель switch.tion_air_intake_target — желаемое положение заслонки
#     (вкл = открыто / воздух с улицы, выкл = закрыто / рециркуляция).
#   - При команде из HA — не откатывается (optimistic: true).
#   - При изменении заслонки с пульта — переключатель обновляется вслед за железом.
#   - При включении вентилятора (скорость 0 → >0) — повторно применяет желаемое
#     состояние заслонки, т.к. при скорости 0 устройство игнорирует команды.
#   - Физический select tion_air_intake_current определяется здесь с internal: true
#     и скрыт из HA. В ESPHome-конфиге бризера его можно убрать или оставить —
#     этот пакет не зависит от внешнего определения.
#
# Особенности железа (проверено на устройстве):
#   - При fan_speed=0 устройство игнорирует команды заслонки; on_value при этом
#     НЕ срабатывает — switch не откатывается, но заслонка остаётся в старом положении.
#   - При fan_speed=0 устройство само закрывает заслонку (indoor) — это норма.
#   - После включения (0→>0) железо несколько секунд отдаёт ещё старое (закрытое)
#     положение, пока физически догоняет команду.
#   - Как только fan_speed переходит 0→>0 — команды снова принимаются.
#
# Алгоритм повторного применения при включении вентилятора:
#   1. Флаг tion_intake_fan_was_off взводится при fan_speed=0 (и при загрузке — initial: true).
#   2. При первом тике >0 — посылаем команду заслонки согласно tion_air_intake_target.state
#      и взводим окно устаканивания tion_intake_settle_until = now + 10 c.
#   3. optimistic: true на switch — не откатывает состояние когда железо молчит (fan=0).
#      Без этого switch сбрасывался бы в исходное положение через секунду.
#   4. Зеркалирование железо→target (on_value) применяется ТОЛЬКО при достоверном
#      отчёте: fan_speed>0 И окно устаканивания прошло. Иначе авто-закрытие при fan=0 или
#      догоняющий отчёт перетёрли бы желаемое положение (open→closed) при авто-включении.
#
# Подключение:
#
# packages:
#   tion_intake:
#     url: https://github.com/dima11235/esphome-tion-ha-lovelace
#     ref: main
#     refresh: 0s
#     files:
#       - esphome/tion_intake_3s.yaml   # этот файл

### ESPHome package: Air intake control for Tion 3S (outdoor / indoor / mixed)

globals:
  - id: tion_intake_fan_was_off
    type: bool
    restore_value: no
    initial_value: 'true'  # true = при загрузке считаем, что вентилятор был выключен → повторим команду на первом тике
  - id: tion_intake_settle_until
    type: uint32_t
    restore_value: no
    initial_value: '0'  # millis() до которого НЕ зеркалим железо→target: заслонка догоняет команду после включения

# Физический select — скрыт из HA, обновляет переключатель при изменении с пульта
select:
  - platform: tion
    id: tion_air_intake_current
    type: air_intake
    name: "Air Intake"
    internal: true
    on_value:
      # Зеркалим железо→target только при достоверном отчёте: вентилятор работает
      # И окно устаканивания после включения прошло. Иначе это авто-закрытие при
      # fan=0 или догоняющий отчёт железа — target не трогаем.
      - lambda: |-
          if (id(tion_intake_fan_speed).state > 0 &&
              !id(tion_intake_fan_was_off) &&
              millis() >= id(tion_intake_settle_until))
            id(tion_air_intake_target).publish_state(x == "outdoor");

# Датчик скорости — скрыт из HA, нужен для повторного применения при включении вентилятора
sensor:
  - platform: tion
    id: tion_intake_fan_speed
    type: fan_speed
    name: "Fan Speed"
    internal: true
    on_value:
      - lambda: |-
          if (x == 0) {
            id(tion_intake_fan_was_off) = true;  // при fan=0 железо игнорирует команды
          } else if (id(tion_intake_fan_was_off)) {
            id(tion_intake_fan_was_off) = false;
            // окно устаканивания: пока заслонка физически догоняет команду,
            // её догоняющие отчёты не должны перетирать target
            id(tion_intake_settle_until) = millis() + 10000;  // 10 c
            // первый тик после включения — повторяем желаемое состояние заслонки
            auto call = id(tion_air_intake_current).make_call();
            call.set_option(id(tion_air_intake_target).state ? "outdoor" : "indoor");
            call.perform();
          }

# Управляющий переключатель — виден в HA
switch:
  - platform: template
    name: "Air Intake"
    id: tion_air_intake_target
    icon: "mdi:valve"
    optimistic: true       # не откатывать состояние при fan=0 (железо молчит, on_value не срабатывает)
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - logger.log: "tion_intake_3s: target → open (outdoor)"
      - select.set:
          id: tion_air_intake_current
          option: "outdoor"
    turn_off_action:
      - logger.log: "tion_intake_3s: target → closed (indoor)"
      - select.set:
          id: tion_air_intake_current
          option: "indoor"
