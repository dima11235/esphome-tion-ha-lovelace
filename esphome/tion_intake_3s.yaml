# ESPHome-пакет для бризера Tion (https://github.com/dentra/esphome-tion)
# Репозиторий: https://github.com/dima11235/esphome-tion-ha-lovelace
#
# Пакет управления воздушной заслонкой для Tion 3S.
#
# Что делает:
#   - Добавляет в HA переключатель switch.air_intake_target — желаемое положение заслонки
#     (вкл = открыто / воздух с улицы, выкл = закрыто / рециркуляция).
#   - При команде из HA — не откатывается, даже если устройство отклоняет команду.
#   - При изменении заслонки с пульта — переключатель обновляется вслед за железом.
#   - Физический select tion_air_intake_current определяется здесь с internal: true
#     и скрыт из HA. В ESPHome-конфиге бризера его можно убрать или оставить —
#     этот пакет не зависит от внешнего определения.
#
# Подключение:
#
# packages:
#   tion_intake:
#     url: https://github.com/dima11235/esphome-tion-ha-lovelace
#     ref: main
#     refresh: 0s
#     files:
#       - esphome/tion_intake_3s.yaml   # этот файл

### ESPHome package: Air intake control for Tion 3S (outdoor / indoor / mixed)

globals:
  # Флаг: команда из HA в процессе. Пока активен — on_value игнорируется
  # (защита от отката устройства и от множественных on_value).
  # Префикс tion_intake_ исключает конфликт с глобалами других пакетов.
  - id: tion_intake_commanding
    type: bool
    restore_value: no
    initial_value: 'false'

# Сбрасывает флаг через 3 секунды после команды.
# mode: restart — повторная команда продлевает окно.
script:
  - id: tion_intake_clear_commanding
    mode: restart
    then:
      - delay: 3s
      - lambda: id(tion_intake_commanding) = false;

# Физический select — скрыт из HA
select:
  - platform: tion
    id: tion_air_intake_current
    type: air_intake
    name: "Air Intake"
    internal: true
    on_value:
      # Если команда из HA в процессе — игнорируем (защита от отката устройства).
      # Иначе это изменение с пульта — обновляем переключатель вслед за железом.
      - lambda: |-
          if (!id(tion_intake_commanding))
            id(air_intake_target).publish_state(x == "outdoor");

# Управляющий переключатель — виден в HA
switch:
  - platform: template
    name: "Air Intake Open"
    id: air_intake_target
    icon: "mdi:valve"
    turn_on_action:
      - lambda: id(tion_intake_commanding) = true;
      - script.execute: tion_intake_clear_commanding
      - logger.log: "tion_intake_3s: target → open (outdoor)"
      - select.set:
          id: tion_air_intake_current
          option: "outdoor"
    turn_off_action:
      - lambda: id(tion_intake_commanding) = true;
      - script.execute: tion_intake_clear_commanding
      - logger.log: "tion_intake_3s: target → closed (indoor)"
      - select.set:
          id: tion_air_intake_current
          option: "indoor"
