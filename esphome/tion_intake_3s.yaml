# ESPHome-пакет для бризера Tion (https://github.com/dentra/esphome-tion)
# Репозиторий: https://github.com/dima11235/esphome-tion-ha-lovelace
#
# Управление заслонкой для Tion 3S (select: outdoor / indoor / mixed).
# В ESPHome-конфиге бризера убери или оставь tion_air_intake_current — этот файл
# определяет его сам с internal: true, от внешнего определения ничего не зависит.
#
# Подключение:
#
# packages:
#   tion_auto_mode:
#     url: https://github.com/dima11235/esphome-tion-ha-lovelace
#     ref: main
#     refresh: 0s
#     files:
#       - esphome/tion_auto_mode.yaml   # обязательно, нужен current_fan_speed
#       - esphome/tion_intake_3s.yaml   # этот файл

### ESPHome package: Air intake control for Tion 3S (outdoor / indoor / mixed)

# Хранит целевое положение заслонки между перезагрузками
globals:
  - id: air_intake_target_open
    type: bool
    restore_value: yes
    initial_value: 'true'

# Физический select — скрыт из HA, только для внутренней логики
select:
  - platform: tion
    id: tion_air_intake_current
    type: air_intake
    name: "Air Intake"
    internal: true
    on_value:
      # Реактивная коррекция: если заслонка сама сменила положение — вернуть
      # При скорости 0 заслонка закрывается автоматически — это норма, не трогаем
      - if:
          condition:
            and:
              - lambda: 'return int(id(current_fan_speed).state) > 0;'
              - lambda: |-
                  std::string expected = id(air_intake_target_open) ? "outdoor" : "indoor";
                  return x != expected;
          then:
            - logger.log: "tion_intake_3s: auto-correcting air intake"
            - select.set:
                id: tion_air_intake_current
                option: !lambda |-
                  return id(air_intake_target_open) ? std::string("outdoor") : std::string("indoor");

# Управляющий переключатель — виден в HA, показывает целевое положение
switch:
  - platform: template
    name: "Air Intake Open"
    id: air_intake_target
    icon: "mdi:valve"
    lambda: 'return id(air_intake_target_open);'
    turn_on_action:
      - logger.log: "tion_intake_3s: target → open (outdoor)"
      - globals.set: { id: air_intake_target_open, value: 'true' }
      - if:
          condition:
            lambda: 'return int(id(current_fan_speed).state) > 0;'
          then:
            - select.set:
                id: tion_air_intake_current
                option: "outdoor"
    turn_off_action:
      - logger.log: "tion_intake_3s: target → closed (indoor)"
      - globals.set: { id: air_intake_target_open, value: 'false' }
      - if:
          condition:
            lambda: 'return int(id(current_fan_speed).state) > 0;'
          then:
            - select.set:
                id: tion_air_intake_current
                option: "indoor"

# Периодическая коррекция — восстанавливает состояние после запуска вентилятора
interval:
  - interval: 10s
    then:
      - if:
          condition:
            and:
              - lambda: 'return int(id(current_fan_speed).state) > 0;'
              - lambda: |-
                  std::string expected = id(air_intake_target_open) ? "outdoor" : "indoor";
                  return id(tion_air_intake_current).state != expected;
          then:
            - logger.log: "tion_intake_3s: periodic correction triggered"
            - select.set:
                id: tion_air_intake_current
                option: !lambda |-
                  return id(air_intake_target_open) ? std::string("outdoor") : std::string("indoor");
