# ESPHome-пакет для бризера Tion (https://github.com/dentra/esphome-tion)
# Репозиторий: https://github.com/dima11235/esphome-tion-ha-lovelace
#
# Пакет управления воздушной заслонкой для Tion 3S.
#
# Что делает:
#   - Добавляет в HA переключатель switch.air_intake_target — целевое положение заслонки
#     (вкл = открыто / воздух с улицы, выкл = закрыто / рециркуляция).
#   - Физический select tion_air_intake_current определяется здесь с internal: true
#     и скрыт из HA. В ESPHome-конфиге бризера его можно убрать или оставить —
#     этот пакет не зависит от внешнего определения.
#   - Boot-синхронизация: ждёт первого момента когда скорость > 0, затем:
#       * если пользователь не менял таргет — читает положение заслонки и выставляет таргет по нему;
#       * если пользователь менял таргет — применяет таргет к железу.
#   - Автокоррекция: если заслонка самопроизвольно сменила положение при работающем
#     вентиляторе — возвращает в целевое состояние (реактивно через on_value
#     и периодически раз в 10 с).
#   - При скорости 0 заслонка закрывается устройством автоматически — коррекция
#     не срабатывает, это штатное поведение.
#   - Флаг boot_sync_done блокирует автокоррекцию до завершения boot-синхронизации.
#
# Требует: esphome/tion_auto_mode.yaml (нужен sensor current_fan_speed)
#
# Подключение:
#
# packages:
#   tion_auto_mode:
#     url: https://github.com/dima11235/esphome-tion-ha-lovelace
#     ref: main
#     refresh: 0s
#     files:
#       - esphome/tion_auto_mode.yaml   # обязательно, нужен current_fan_speed
#       - esphome/tion_intake_3s.yaml   # этот файл

### ESPHome package: Air intake control for Tion 3S (outdoor / indoor / mixed)

# Глобальные переменные
globals:
  - id: air_intake_target_open
    type: bool
    restore_value: no
    initial_value: 'true'

  # Флаг: автокоррекция разрешена только после завершения boot-синхронизации
  - id: boot_sync_done
    type: bool
    restore_value: no
    initial_value: 'false'

  # Флаг: пользователь менял таргет до первого запуска вентилятора после загрузки
  - id: user_changed_target
    type: bool
    restore_value: no
    initial_value: 'false'

# Физический select — скрыт из HA, только для внутренней логики
select:
  - platform: tion
    id: tion_air_intake_current
    type: air_intake
    name: "Air Intake"
    internal: true
    on_value:
      # Реактивная коррекция: если заслонка сама сменила положение — вернуть
      # При скорости 0 заслонка закрывается автоматически — это норма, не трогаем
      # До завершения boot-синхронизации не вмешиваемся
      - if:
          condition:
            and:
              - lambda: 'return id(boot_sync_done);'
              - lambda: 'return int(id(current_fan_speed).state) > 0;'
              - lambda: |-
                  std::string expected = id(air_intake_target_open) ? "outdoor" : "indoor";
                  return x != expected;
          then:
            - logger.log: "tion_intake_3s: auto-correcting air intake"
            - select.set:
                id: tion_air_intake_current
                option: !lambda |-
                  return id(air_intake_target_open) ? std::string("outdoor") : std::string("indoor");

# Управляющий переключатель — виден в HA, показывает целевое положение
switch:
  - platform: template
    name: "Air Intake Open"
    id: air_intake_target
    icon: "mdi:valve"
    lambda: 'return id(air_intake_target_open);'
    turn_on_action:
      - logger.log: "tion_intake_3s: target → open (outdoor)"
      - globals.set: { id: user_changed_target, value: 'true' }
      - globals.set: { id: air_intake_target_open, value: 'true' }
      - if:
          condition:
            lambda: 'return int(id(current_fan_speed).state) > 0;'
          then:
            - select.set:
                id: tion_air_intake_current
                option: "outdoor"
          # При скорости 0 команда железу не отправляется намеренно:
          # заслонка при speed=0 закрыта устройством автоматически и может не реагировать
          # на команды, что привело бы к бесконечным повторным отправкам из автокоррекции.
    turn_off_action:
      - logger.log: "tion_intake_3s: target → closed (indoor)"
      - globals.set: { id: user_changed_target, value: 'true' }
      - globals.set: { id: air_intake_target_open, value: 'false' }
      - if:
          condition:
            lambda: 'return int(id(current_fan_speed).state) > 0;'
          then:
            - select.set:
                id: tion_air_intake_current
                option: "indoor"

interval:
  # Boot-синхронизация: ждём первого момента когда скорость > 0.
  # Если пользователь не менял таргет — читаем положение заслонки и выставляем таргет.
  # Если менял — применяем таргет к железу.
  - interval: 1s
    then:
      - if:
          condition:
            and:
              - lambda: 'return !id(boot_sync_done);'
              - lambda: 'return int(id(current_fan_speed).state) > 0;'
          then:
            - if:
                condition:
                  lambda: 'return id(user_changed_target);'
                then:
                  - logger.log: "tion_intake_3s: boot: applying user target to hardware"
                  - select.set:
                      id: tion_air_intake_current
                      option: !lambda |-
                        return id(air_intake_target_open) ? std::string("outdoor") : std::string("indoor");
                else:
                  - logger.log: "tion_intake_3s: boot: syncing target from hardware"
                  - globals.set:
                      id: air_intake_target_open
                      value: !lambda |-
                        std::string opt = id(tion_air_intake_current).current_option();
                        return opt.empty() || opt == "outdoor";  // не инициализировано → открыто
            - globals.set: { id: boot_sync_done, value: 'true' }

  # Периодическая коррекция — восстанавливает состояние при спонтанном изменении заслонки
  - interval: 10s
    then:
      - if:
          condition:
            and:
              - lambda: 'return id(boot_sync_done);'
              - lambda: 'return int(id(current_fan_speed).state) > 0;'
              - lambda: |-
                  std::string expected = id(air_intake_target_open) ? "outdoor" : "indoor";
                  return id(tion_air_intake_current).current_option() != expected;
          then:
            - logger.log: "tion_intake_3s: periodic correction triggered"
            - select.set:
                id: tion_air_intake_current
                option: !lambda |-
                  return id(air_intake_target_open) ? std::string("outdoor") : std::string("indoor");
