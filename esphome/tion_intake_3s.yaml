# ESPHome-пакет для бризера Tion (https://github.com/dentra/esphome-tion)
# Репозиторий: https://github.com/dima11235/esphome-tion-ha-lovelace
#
# Пакет управления воздушной заслонкой для Tion 3S.
#
# Что делает:
#   - Добавляет в HA переключатель switch.air_intake_target — положение заслонки
#     (вкл = открыто / воздух с улицы, выкл = закрыто / рециркуляция).
#   - При команде из HA — не откатывается (optimistic: true).
#   - При изменении заслонки с пульта или при выключении вентилятора —
#     переключатель обновляется вслед за железом.
#   - При включении вентилятора (скорость 0 → >0) — повторно применяет
#     желаемое состояние (последнюю команду пользователя), а не отображаемое,
#     т.к. при выключении вентилятора устройство закрывает заслонку и switch
#     показывает "закрыто".
#   - Физический select tion_air_intake_current определяется здесь с internal: true
#     и скрыт из HA. В ESPHome-конфиге бризера его можно убрать или оставить —
#     этот пакет не зависит от внешнего определения.
#
# Подключение:
#
# packages:
#   tion_intake:
#     url: https://github.com/dima11235/esphome-tion-ha-lovelace
#     ref: main
#     refresh: 0s
#     files:
#       - esphome/tion_intake_3s.yaml   # этот файл

### ESPHome package: Air intake control for Tion 3S (outdoor / indoor / mixed)

globals:
  # Желаемое состояние — последняя команда пользователя.
  # Сохраняется во flash, чтобы пережить перезагрузку.
  # Используется при включении вентилятора вместо air_intake_target.state,
  # т.к. switch может показывать "закрыто" из-за автоматического закрытия при fan=0.
  - id: tion_intake_desired_open
    type: bool
    restore_value: yes
    initial_value: 'true'
  # Отслеживает переход скорости 0 → >0
  - id: tion_intake_fan_was_off
    type: bool
    restore_value: no
    initial_value: 'true'

# Физический select — скрыт из HA, обновляет переключатель при изменении состояния
select:
  - platform: tion
    id: tion_air_intake_current
    type: air_intake
    name: "Air Intake"
    internal: true
    on_value:
      - lambda: id(air_intake_target).publish_state(x == "outdoor");

# Датчик скорости — скрыт из HA, нужен для повторного применения при включении вентилятора
sensor:
  - platform: tion
    id: tion_intake_fan_speed
    type: fan_speed
    name: "Fan Speed"
    internal: true
    on_value:
      - lambda: |-
          if (x == 0) {
            id(tion_intake_fan_was_off) = true;
          } else if (id(tion_intake_fan_was_off)) {
            id(tion_intake_fan_was_off) = false;
            // Вентилятор включился — применяем желаемое состояние, не текущее switch.state
            auto call = id(tion_air_intake_current).make_call();
            call.set_option(id(tion_intake_desired_open) ? "outdoor" : "indoor");
            call.perform();
          }

# Управляющий переключатель — виден в HA
switch:
  - platform: template
    name: "Air Intake Open"
    id: air_intake_target
    icon: "mdi:valve"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - lambda: id(tion_intake_desired_open) = true;
      - logger.log: "tion_intake_3s: target → open (outdoor)"
      - select.set:
          id: tion_air_intake_current
          option: "outdoor"
    turn_off_action:
      - lambda: id(tion_intake_desired_open) = false;
      - logger.log: "tion_intake_3s: target → closed (indoor)"
      - select.set:
          id: tion_air_intake_current
          option: "indoor"
